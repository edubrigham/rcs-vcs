  /rcs/broadcasts/{broadcastId}/recipients:
    get:
      tags:
        - RCS Broadcasts
      summary: "Get the list of recipients for the RCS Broadcast"
      description: "Get the recipients for a RCS Broadcast by id."
      operationId: rcsBroadcastRecipientsGet
      parameters:
        - name: x-version
          description: "The version of API, by default use the last version."
          in: header
          schema:
            type: string
      
        - name: broadcastId
          description: 'The RCS Broadcast Id to retrieve.'
          in: path
          required: true
          schema:
            type: string
            format: uuid
            example: '1f3b25a8-a9fc-4139-a1b8-a0e55d4f7dfd'
        - name: page
          in: query
          description: 'The page number.'
          required: false
          schema:
            type: integer
            default: 1
        - name: pagesize
          in: query
          description: 'The page size limit.'
          required: false
          schema:
            type: integer
            maximum: 100
            minimum: 1
            default: 25
        - name: phone
          in: query
          required: false
          description: 'Search by phone number in E164 without leading +'
          schema:
            type: string
            minimum: 7
            maximum: 20
            example: '32499365485'
        - name: completed
          in: query
          description: 'Filter based on the completed state, take all if omitted.'
          required: false
          schema:
            type: boolean
        - name: status
          in: query
          description: 'Filter based on the status, take all if omitted.'
          required: false
          schema:
            type: string
            enum:
              - 'delivered'
              - 'failed'
              - 'queued'
              - 'sent'
              - 'canceled'
              - 'invalid'
              - 'paused'
              - 'not-started'

      responses:
        200:
          description: "A successful request returns the RCS Broadcast recipients."
