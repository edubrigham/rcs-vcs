        - name: x-version
          description: "The version of API, by default use the last version."
          in: header
          schema:
            type: string
    
        - name: page
          in: query
          description: 'The page number.'
          required: false
          schema:
            type: integer
            default: 1
        - name: pagesize
          in: query
          description: 'The page size limit.'
          required: false
          schema:
            type: integer
            maximum: 100
            minimum: 1
            default: 25


      responses:
        200:
          description: "A successful request returns the list of RCS Broadcasts."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/rcsBroadcastList"

        401:
          description: "Unauthorized request. Make sure that you provided the right credentials."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorModel"

        422:
          description: "The request is invalid."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorModel"

        429:
          description: "Too Many Requests."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorModel"


